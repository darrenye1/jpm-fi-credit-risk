# Auto-refresh TD FI credit dashboard data, then push so Vercel redeploys.
#
# What refreshes automatically (Yahoo Finance via yfinance):
#   - Market cap, price, assets, equity, net income, revenue trends, ROA/ROE
#   - Recomputed scorecard / PD / EL / stress using current filing overlay
#
# What does NOT auto-update (must edit after each earnings release):
#   - data/regulatory_metrics.json (CET1, NPL, LCR, NIM, etc. from filings)
#
name: Refresh credit dashboard

on:
  schedule:
    # Every Monday 15:00 UTC (~10:00 / 11:00 AM Eastern)
    - cron: "0 15 * * 1"
  workflow_dispatch:
    inputs:
      ticker:
        description: "Focus ticker (default TD)"
        required: false
        default: "TD"
        type: string

permissions:
  contents: write

concurrency:
  group: refresh-credit-dashboard
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export latest analysis JSON
        env:
          MPLBACKEND: Agg
          PYTHONIOENCODING: utf-8
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          if [ -z "$TICKER" ]; then TICKER="TD"; fi
          echo "Refreshing dashboard for $TICKER ..."
          python scripts/export_for_web.py "$TICKER"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analysis.json public/data/analysis.json outputs/reports/ || true
          if git diff --staged --quiet; then
            echo "No data changes — skip commit."
          else
            git commit -m "chore: refresh FI credit dashboard data"
            git push
          fi
